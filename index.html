<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>FORGE</title>
<meta name="description" content="Your open-and-go workout. Just press start.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0A0B0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<style>
/* ============================ FORGED STEEL — design tokens ============================ */
:root{
  color-scheme:dark;
  --bg-0:#0A0B0D; --bg-1:#101216; --bg-2:#15181D; --bg-3:#1C2027;
  --line:#262B33; --line-2:#333A45;
  --ink-0:#F4F6F8; --ink-1:#AEB6C2; --ink-2:#727C8A;
  --ember:#FF5A1F; --ember-bright:#FF7A45; --ember-deep:#C23A0E; --ember-glow:rgba(255,90,31,.30); --ember-ink:#0A0B0D;
  --done:#39D98A; --done-glow:rgba(57,217,138,.22);
  --easy:#5BB8FF; --right:#39D98A; --hard:#FF5A1F; --maintained:#8A93A1; --warn:#FFC247;
  --r-2:14px; --r-3:20px; --r-card:24px; --r-pill:999px;
  --tap:48px; --cta:60px; --hero:84px;
  --gut:18px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --ease:cubic-bezier(.23,1,.32,1); --ease-drawer:cubic-bezier(.32,.72,0,1);
  --ff-d:"Archivo","Helvetica Neue",system-ui,sans-serif;
  --ff:"Hanken Grotesk","Helvetica Neue",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{margin:0;min-height:100%;background:var(--bg-0)}
body{margin:0;min-height:100%}
body{
  background:transparent; color:var(--ink-0); font-family:var(--ff);
  font-size:17px; line-height:1.45; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1,"lnum" 1;
}
#app{position:relative;z-index:1;min-height:100%;max-width:560px;margin:0 auto;padding:calc(var(--safe-t) + 8px) var(--gut) calc(var(--safe-b) + 24px)}
/* Aurora living background (enabled by the Aurora theme) */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .9s ease;overflow:hidden}
#aurora.on{opacity:.5}
#aurora b{position:absolute;display:block;width:75vw;height:75vw;max-width:560px;max-height:560px;border-radius:50%;filter:blur(60px);mix-blend-mode:screen;will-change:transform;opacity:.9}
#aurora b:nth-child(1){background:var(--au-1);top:-12%;left:-15%;animation:au1 19s ease-in-out infinite alternate}
#aurora b:nth-child(2){background:var(--au-2);bottom:-18%;right:-15%;animation:au2 23s ease-in-out infinite alternate}
#aurora b:nth-child(3){background:var(--au-3);top:28%;left:25%;animation:au3 27s ease-in-out infinite alternate}
@keyframes au1{from{transform:translate(0,0) scale(1)}to{transform:translate(22vw,16vh) scale(1.25)}}
@keyframes au2{from{transform:translate(0,0) scale(1.12)}to{transform:translate(-18vw,-12vh) scale(.9)}}
@keyframes au3{from{transform:translate(0,0) scale(1)}to{transform:translate(14vw,-18vh) scale(1.22)}}
h1,h2,h3{font-family:var(--ff-d);font-weight:800;letter-spacing:-.01em;margin:0}
.display{font-family:var(--ff-d);font-weight:800;font-variant-numeric:tabular-nums}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
.muted{color:var(--ink-1)} .dim{color:var(--ink-2)}
button{font-family:inherit;font-size:inherit;color:inherit;border:0;background:none;cursor:pointer}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;min-height:var(--cta);padding:0 20px;border-radius:var(--r-2);background:var(--bg-3);color:var(--ink-0);font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),inset 0 -1px 0 rgba(0,0,0,.5);transition:transform .12s var(--ease),background .15s}
.btn:active{transform:scale(.97)}
.btn-ember{background:linear-gradient(110deg,var(--ember-bright),var(--ember),var(--ember-deep));background-size:220% 100%;animation:sheen 7s ease-in-out infinite;color:var(--ember-ink);box-shadow:0 0 0 1px var(--ember),0 8px 24px var(--ember-glow)}
@keyframes sheen{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-hero{min-height:var(--hero);font-size:20px;font-weight:800;width:100%;border-radius:var(--r-3)}
.btn-ghost{background:transparent;box-shadow:inset 0 0 0 1px var(--line-2);color:var(--ink-1)}
.btn-block{width:100%}
.card{background:var(--bg-2);border-radius:var(--r-card);padding:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 24px rgba(0,0,0,.45)}
.card+.card{margin-top:14px}
.row{display:flex;align-items:center;gap:12px}
.between{justify-content:space-between}
.stack>*+*{margin-top:14px}
.hr{height:1px;background:var(--line);margin:16px 0;border:0;box-shadow:0 1px 0 rgba(255,255,255,.03)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-pill);background:var(--bg-3);font-size:13px;font-weight:700;color:var(--ink-1)}
.ic{width:15px;height:15px;display:inline-block;vertical-align:-2px;flex:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
button:focus-visible,input:focus-visible,label:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--ember);outline-offset:2px;border-radius:10px}
.tag{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--bg-3);color:var(--ink-2)}
.tag.db{color:var(--ember-bright)} .tag.band{color:var(--easy)}
.grow{flex:1}
.center{text-align:center}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.brand{font-family:var(--ff-d);font-weight:800;letter-spacing:.18em;font-size:15px}
.brand b{color:var(--ember)}
.iconbtn{width:44px;height:44px;border-radius:12px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:18px}
/* day strip */
.daystrip{display:flex;gap:8px;margin-bottom:14px}
.daystrip .d{flex:1;text-align:center;padding:10px 0;border-radius:12px;background:var(--bg-2);color:var(--ink-2);font-weight:800;font-family:var(--ff-d)}
.daystrip .d.on{background:var(--bg-3);color:var(--ink-0);box-shadow:inset 3px 0 0 var(--ember)}
.daystrip .d small{display:block;font-size:10px;letter-spacing:.08em;color:var(--ink-2);font-weight:700}
/* today card */
.today{position:relative;overflow:hidden}
.today::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--ember-bright),var(--ember-deep))}
.today h2{font-size:26px;margin:6px 0 2px}
.metarow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
/* ring */
.ring-wrap{display:flex;align-items:center;gap:16px}
.ringnum{font-size:13px;font-weight:800;color:var(--ink-1)}
/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tile{background:var(--bg-2);border-radius:16px;padding:14px 12px;text-align:center}
.tile .v{font-family:var(--ff-d);font-weight:800;font-size:22px;font-variant-numeric:tabular-nums}
.tile .l{font-size:11px;color:var(--ink-2);letter-spacing:.04em;margin-top:2px}
.tile .v.ember{color:var(--ember-bright)}
/* companion */
.companion{display:flex;align-items:center;gap:14px}
.companion svg{width:64px;height:64px;flex:none}
/* runner */
.runner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pips{display:flex;gap:5px}
.pips i{width:18px;height:4px;border-radius:3px;background:var(--line-2)}
.pips i.on{background:var(--ember)}
.pips i.done{background:var(--done)}
.exname{font-size:24px;margin-top:2px}
.cue{color:var(--ink-1);font-size:17px;margin-top:8px}
.mistake{color:var(--ink-2);font-size:14px;margin-top:6px}
.target{font-family:var(--ff-d);font-weight:800;font-variant-numeric:tabular-nums;font-size:15px;color:var(--ink-1);margin-top:12px}
.ecccue{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 13px;border-radius:12px;background:var(--ember-glow);color:var(--ember-bright);font-weight:700;font-size:14px}
.wu-item{padding:8px 0;border-bottom:1px solid var(--line)}
.wu-item:last-child{border-bottom:0}
.watchlink{margin:6px 0 0 36px;background:none;border:0;color:var(--ember);font-weight:700;font-size:13px;padding:4px 0;cursor:pointer}
.watchlink:active{opacity:.6}
.itb-head{margin:14px 0 2px;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ember)}
.wu-item.itb{border-left:3px solid var(--ember);padding-left:11px}
.demo{width:100%;height:120px;border-radius:16px;background:radial-gradient(120% 120% at 50% 0%,var(--bg-3),var(--bg-1));display:flex;align-items:center;justify-content:center;margin-top:14px;color:var(--ink-2);font-size:13px;position:relative;overflow:hidden}
.demo-cta{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:12px;font-weight:700;color:var(--ember);text-shadow:0 1px 4px rgba(0,0,0,.6)}
/* Animated exercise figure (offline, drawn from joint coordinates) */
.exfig{width:108px;height:108px;display:block}
.exfig path{stroke:var(--ember);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;fill:none}
.exfig .hd{fill:var(--ember);stroke:none}
.exfig .eq{stroke:var(--ink-1);stroke-width:6;stroke-linecap:round;fill:none}
.exfig .eqd{fill:var(--ink-1);stroke:none}
.exfig .fa{animation:exFlipA 2.4s steps(1,end) infinite}
.exfig .fb{opacity:0;animation:exFlipB 2.4s steps(1,end) infinite}
@keyframes exFlipA{0%{opacity:1}50%{opacity:0}}
@keyframes exFlipB{0%{opacity:0}50%{opacity:1}}
.demo svg{width:96px;height:96px;opacity:.92}
.sets{margin-top:16px}
.setrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:var(--bg-2);margin-bottom:10px;transition:background .2s}
.setrow.active{box-shadow:inset 0 0 0 1.5px var(--ember);background:var(--bg-3)}
.setrow.done{background:rgba(57,217,138,.08);box-shadow:inset 0 0 0 1px rgba(57,217,138,.25)}
.setrow .sn{width:30px;font-weight:800;color:var(--ink-2);font-family:var(--ff-d)}
.setrow .field{flex:1;text-align:center}
.setrow .field .fv{font-family:var(--ff-d);font-weight:800;font-size:20px;font-variant-numeric:tabular-nums}
.setrow .field .fl{font-size:10px;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:44px;height:44px;border-radius:10px;background:var(--bg-3);font-size:22px;font-weight:700;color:var(--ink-0);display:flex;align-items:center;justify-content:center}
.chk{width:54px;height:54px;border-radius:50%;flex:none;background:var(--bg-3);display:flex;align-items:center;justify-content:center;transition:transform .12s var(--ease)}
.chk svg{width:26px;height:26px}
.setrow.active .chk{background:var(--done);box-shadow:0 0 0 6px var(--done-glow)}
.setrow.active .chk:active{transform:scale(.92)}
.setrow.done .chk{background:transparent;box-shadow:inset 0 0 0 1.5px var(--done)}
.ghost{font-size:11px;color:var(--ink-2);margin-left:40px;margin-bottom:8px}
/* chip picker */
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 10px;-webkit-overflow-scrolling:touch}
.chip{flex:none;min-width:54px;height:46px;border-radius:12px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--ff-d);color:var(--ink-1);font-variant-numeric:tabular-nums}
.chip.sel{background:var(--ember);color:var(--ember-ink);box-shadow:0 0 0 1px var(--ember),0 4px 14px var(--ember-glow)}
/* feel control */
.feel{display:flex;gap:8px;margin-top:8px}
.feel button{flex:1;min-height:var(--cta);border-radius:14px;background:var(--bg-3);font-weight:800;font-family:var(--ff-d);color:var(--ink-1)}
.feel button[data-f=Easy].sel{background:var(--easy);color:#04121f}
.feel button[data-f=Right].sel{background:var(--right);color:#04140c}
.feel button[data-f=Hard].sel{background:var(--hard);color:var(--ember-ink)}
.label-q{font-size:13px;color:var(--ink-2);text-align:center;margin:14px 0 4px;letter-spacing:.02em}
/* bottom bar */
.bottombar{position:sticky;bottom:0;padding:12px 0 calc(var(--safe-b) + 6px);background:linear-gradient(180deg,rgba(10,11,13,0),var(--bg-0) 28%)}
/* rest sheet */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:40;transform:translateY(110%);transition:transform .34s var(--ease-drawer)}
.sheet.show{transform:translateY(0)}
.sheet-inner{max-width:560px;margin:0 auto;background:var(--bg-2);border-radius:22px 22px 0 0;padding:18px var(--gut) calc(var(--safe-b) + 18px);box-shadow:0 -12px 40px rgba(0,0,0,.55)}
.resttime{font-family:var(--ff-d);font-weight:800;font-size:46px;text-align:center;font-variant-numeric:tabular-nums}
.restbar{height:6px;border-radius:3px;background:var(--bg-3);overflow:hidden;margin:8px 0 14px}
.restbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--ember-bright));width:100%}
.restctrls{display:flex;gap:10px}
.restctrls .btn{flex:1}
/* onboarding */
.opt{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.opt button{padding:10px 16px;border-radius:12px;background:var(--bg-3);font-weight:700;color:var(--ink-1)}
.opt button.sel{background:var(--ember);color:var(--ember-ink)}
input[type=text]{width:100%;background:var(--bg-3);border:0;border-radius:12px;color:var(--ink-0);padding:14px;font-size:17px;font-family:inherit}
/* history */
.hitem{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.hitem .hl{font-weight:700} .hitem .hr{color:var(--ink-2);font-size:13px;text-align:right}
/* recap */
.recap-xp{font-family:var(--ff-d);font-weight:800;font-size:40px;color:var(--ember-bright);text-align:center;font-variant-numeric:tabular-nums}
.event{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--bg-2);margin-bottom:10px}
.event .ico{font-size:22px}
/* a2hs banner */
.a2hs{position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 12px);max-width:536px;margin:0 auto;background:var(--bg-3);border-radius:16px;padding:14px 16px;display:flex;gap:12px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:60}
/* flash */
#flash{position:fixed;inset:0;background:var(--done);opacity:0;pointer-events:none;z-index:80;transition:opacity .12s}
#flash.go{opacity:.5}
.celebrate{animation:pop .6s var(--ease)}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--safe-b) + 90px);background:var(--bg-3);color:var(--ink-0);padding:10px 16px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:70;display:flex;gap:14px;align-items:center}
</style>
</head>
<body>
<div id="aurora"><b></b><b></b><b></b></div>
<div id="app"></div>
<div id="sheet" class="sheet"><div class="sheet-inner" id="sheet-inner"></div></div>
<div id="flash"></div>
<div id="live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<script>
"use strict";
/* ===================================================================================
   FORGE — single-file offline workout PWA.  Layers: Content · Store · Engine · Game · Timer · UI
   =================================================================================== */
const VERSION = "0.9.2";
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const el=(html)=>{const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;};

/* -------------------------------------- CONTENT -------------------------------------- */
// equipment: 'db' (adjustable dumbbells, lb/hand) | 'band' (resistance level)
const EX = {
  goblet_squat:{name:"Goblet Squat",eq:"db",mus:"Quads · Glutes",seed:25,cue:"Hold one DB at your chest, sit straight down between your knees, chest tall.",miss:"Knees caving in or heels lifting."},
  db_row:{name:"DB Bent-Over Row",eq:"db",mus:"Back · Biceps",seed:25,cue:"Hinge ~45°, flat back, pull DBs to your hips, squeeze the shoulder blades.",miss:"Standing too upright and yanking with the arms."},
  db_floor_press:{name:"DB Floor Press",eq:"db",mus:"Chest · Triceps",seed:25,cue:"On your back, press the DBs up and slightly together, elbows about 45°.",miss:"Flaring elbows out to 90°."},
  band_row:{name:"Band Row",eq:"band",mus:"Mid-back · Rear delts",seed:1,cue:"Anchor mid-height, pull the handles to your ribs and squeeze.",miss:"Rounding the shoulders forward on the return."},
  db_rdl:{name:"DB Romanian Deadlift",eq:"db",mus:"Hamstrings · Glutes",seed:30,cue:"Push hips back, soft knees, lower the DBs along your thighs until you feel a stretch.",miss:"Rounding the back or turning it into a squat."},
  band_lat_raise:{name:"Band Lateral Raise",eq:"band",mus:"Side delts",seed:1,cue:"Stand on the band, raise the handles out to your sides to shoulder height.",miss:"Shrugging the traps up to the ears."},
  band_pallof:{name:"Band Pallof Press",eq:"band",mus:"Core · Obliques",seed:1,cue:"Stand side-on to the anchor, press the handle straight out and resist the twist.",miss:"Letting the torso rotate toward the anchor."},
  db_ohp:{name:"DB Overhead Press",eq:"db",mus:"Shoulders · Triceps",seed:20,cue:"Brace your abs, press the DBs overhead without leaning back.",miss:"Arching the lower back to heave the weight up."},
  band_pulldown:{name:"Band Lat Pulldown",eq:"band",mus:"Lats",seed:1,cue:"Anchor overhead, pull the handles down to your chest, driving elbows down.",miss:"Leaning way back so it becomes a row."},
  bulgarian:{name:"Bulgarian Split Squat",eq:"db",mus:"Quads · Glutes",seed:20,cue:"Rear foot elevated, sink straight down over the front leg.",miss:"Front knee caving in or leaning too far forward."},
  band_pullthru:{name:"Band Pull-Through",eq:"band",mus:"Glutes · Hamstrings",seed:1,cue:"Face away from a low anchor, snap your hips forward to stand tall.",miss:"Yanking with the arms or lower back instead of the hips."},
  hammer_curl:{name:"Hammer Curl",eq:"db",mus:"Biceps · Forearms",seed:15,cue:"Palms facing each other, curl up and control the way down.",miss:"Swinging the torso to lift."},
  band_pushdown:{name:"Band Triceps Pushdown",eq:"band",mus:"Triceps",seed:1,cue:"Anchor high, elbows pinned to your sides, push the handles down to lockout.",miss:"Letting the elbows drift forward."},
  db_calf:{name:"Standing DB Calf Raise",eq:"db",mus:"Calves",seed:30,cue:"DBs at your sides, rise onto your toes, full squeeze, slow lower.",miss:"Bouncing through a partial range."},
  db_lunge:{name:"DB Reverse Lunge",eq:"db",mus:"Quads · Glutes",seed:20,cue:"Step back, drop straight down, push through the front heel to stand.",miss:"Knee collapsing in or short choppy steps."},
  db_1arm_row:{name:"Single-Arm DB Row",eq:"db",mus:"Lats · Mid-back",seed:30,cue:"Hand on a knee or bench, drive the elbow back and up.",miss:"Rotating the torso to heave the weight."},
  band_chest:{name:"Band Chest Press",eq:"band",mus:"Chest · Front delts",seed:1,cue:"Anchor behind you at chest height, press the handles forward and together.",miss:"Letting the torso twist or rushing the return."},
  band_facepull:{name:"Band Face Pull",eq:"band",mus:"Rear delts · Traps",seed:1,cue:"Anchor high, pull toward your forehead with elbows high, rotate hands back.",miss:"Pulling too low so it becomes a row."},
  incline_curl:{name:"Incline DB Curl",eq:"db",mus:"Biceps (stretch)",seed:12,cue:"Lie back on an incline, let the arms hang behind the body, then curl.",miss:"Cutting the bottom stretch short."},
  oh_tri:{name:"Overhead DB Triceps Ext",eq:"db",mus:"Triceps (long head)",seed:15,cue:"One DB behind your head, extend up, keep the elbows in.",miss:"Flaring the elbows wide or arching the back."},
  db_crunch:{name:"DB Weighted Crunch",eq:"db",mus:"Abs",seed:10,cue:"Hold a DB on your chest, curl your ribs toward your hips.",miss:"Pulling on the neck instead of using the abs."},
  // band-only substitutes used by Travel mode
  band_squat:{name:"Band Squat",eq:"band",mus:"Quads · Glutes",seed:1,cue:"Stand on the band, handles at your shoulders, push the floor away.",miss:"Letting the band yank you up — control the top."},
  band_ohp:{name:"Banded Overhead Press",eq:"band",mus:"Shoulders · Triceps",seed:1,cue:"Stand on the band, press the handles overhead; tension peaks at lockout.",miss:"Shrugging your shoulders up to your ears."},
  band_curl:{name:"Band Curl",eq:"band",mus:"Biceps",seed:1,cue:"Stand on the band, curl the handles up with elbows pinned.",miss:"Letting the band snap your arms back down."},
  band_calf:{name:"Banded Calf Raise",eq:"band",mus:"Calves",seed:1,cue:"Band under one foot, press up onto your toes, slow lower.",miss:"Rushing reps with no pause at the top."},

/* -------------------------------------- UTIL -------------------------------------- */
function localDate(ms=Date.now()){const d=new Date(ms);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function mondayOf(ms){const d=new Date(ms);d.setHours(0,0,0,0);const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return d;}
function weekKey(ms=Date.now()){const m=mondayOf(ms);return localDate(m.getTime());}
function dbInc(){return S.profile.dumbbellIncrement||5;}
function dumbbellStops(){const inc=dbInc(),out=[];for(let w=inc;w<=S.profile.dumbbellMax+0.001;w+=inc)out.push(Math.round(w*10)/10);return out;}
function snapWeight(w){const inc=dbInc(); let v=Math.round((w||inc)/inc)*inc; return Math.max(inc, Math.min(S.profile.dumbbellMax, Math.round(v*10)/10));}
function bandLevels(){const labels=["Light","Medium","Heavy","X-Heavy","Max"];return labels.slice(0,Math.max(2,S.profile.bandCount)).map((l,i)=>({i,label:l}));}
function est1RM(w,r){return Math.round(w*(1+r/30));}

/* -------------------------------------- ENGINE (progression + Feel) -------------------------------------- */
function seedEx(item){
  const def=EX[item.ex];
  return {load:def.eq==="db"?snapWeight(def.seed):null, bandIdx:def.eq==="band"?0:null,
          targetReps:item.rr[0], rr:item.rr.slice(), sets:item.sets, streak:0, fallback:"load", rom:0, intensity:0, stale:0};
}
function getExState(item){ if(!S.exState[item.ex]) S.exState[item.ex]=seedEx(item); const st=S.exState[item.ex]; st.rr=item.rr.slice(); st.targetReps=clamp(st.targetReps||st.rr[0], st.rr[0], st.rr[1]); return st; }
function activeRoutines(){const n=clamp(S.progress.weeklyGoal||3,3,ROUTINES.length);return ROUTINES.slice(0,n);}
function activeSeason(){const f=(S.settings&&S.settings.seasonFocus)||"auto"; if(f!=="auto"){return SEASONS.find(s=>s.key===f)||SEASONS[0];} return SEASONS[((S.season&&S.season.index)||0)%SEASONS.length];}
function seasonRange(rr,th){const lo=clamp(rr[0]+th.repShift,5,26),hi=clamp(rr[1]+th.repShift,lo+1,30);return [lo,hi];}
// Build today's prescription from routine + stored state + block wave + Right-Sized Today opts.
function prescribe(routine, opts){
  opts=opts||{time:"full",place:"home",energy:"good"};
  const deload = S.blockWeek>=5; const season=activeSeason();
  let items=routine.items.slice();
  if(opts.time==="quick") items=items.filter(it=>it.g!=="3"&&!it.fin);   // compounds only
  if(opts.energy==="low") items=items.filter(it=>!it.fin);
  return items.map(item=>{
    const baseId=item.ex;
    let exId = S.overrides[baseId] || baseId;                                  // plateau swap
    if(opts.place==="travel" && EX[exId].eq==="db" && SUB[exId]) exId=SUB[exId]; // travel band sub
    const def=EX[exId];
    const erange = seasonRange(item.rr, season);                               // season rep emphasis
    const erest = Math.max(30, item.rest + season.restShift);
    const st=getExState({ex:exId, rr:erange, sets:item.sets, rest:erest, g:item.g, fin:item.fin});
    let sets=item.sets;
    if(deload) sets=Math.max(1,sets-1);
    if(opts.time==="quick") sets=Math.min(sets,2);
    if(opts.energy==="low") sets=Math.max(1,sets-1);
    const itech = (def.eq==="db" && st.intensity>0) ? INTENSITY[Math.min(st.intensity,INTENSITY.length)-1] : null;
    const tech = season.tempo ? {tag:"Tempo",tip:"Lower for a slow 3 seconds on every rep."} : itech;
    return {ex:exId,base:baseId,name:def.name,eq:def.eq,mus:def.mus,cue:def.cue,miss:def.miss,
      g:item.g,fin:item.fin,rr:erange,rest:erest,sets,tech,
      weight: def.eq==="db"? st.load : st.bandIdx,
      reps: st.targetReps};
  });
}
// After a session: update each exercise's state for next time (double progression + Feel + ceiling).
function progressExercise(entry){
  const def=EX[entry.ex], st=S.exState[entry.ex]; if(!st) return;
  if(st.intensity==null)st.intensity=0; if(st.stale==null)st.stale=0;
  const working=entry.sets.filter(s=>s.done);
  if(!working.length) return;
  const before=JSON.stringify([st.load,st.bandIdx,st.targetReps,st.sets,st.rom,st.intensity]);
  const hitTop=working.every(s=>s.reps>=st.rr[1]);
  const missBottom=working.some(s=>s.reps<st.rr[0]);
  const feel=entry.feel||"Right";
  if(feel==="Hard"||missBottom){ // back off gently
    st.streak=0;
    if(def.eq==="db"){ if(missBottom&&feel==="Hard") st.load=Math.max(dbInc(),st.load-dbInc()); }
    else { if(st.rom>0)st.rom--; else if(st.bandIdx>0&&missBottom)st.bandIdx--; }
    st.targetReps=st.rr[0];
  } else {
    if(hitTop) st.streak++; else st.streak=0;
    const stepNow = st.streak>=2 || (hitTop&&feel==="Easy");
    if(stepNow){
      if(def.eq==="db"){
        const nw=st.load+dbInc();
        if(nw>S.profile.dumbbellMax){            // maxed dumbbells -> climb the Intensity ladder, not more iron
          st.fallback="intensity";
          if(st.intensity<INTENSITY.length) st.intensity++;
          else if(st.sets<5) st.sets++;          // ladder exhausted -> add density via a set
          st.targetReps=st.rr[0];
        } else { st.load=nw; st.targetReps=st.rr[0]; }
      } else {
        if(st.rom<1){ st.rom++; st.targetReps=st.rr[0]; }       // add slow tempo
        else { if(st.bandIdx<bandLevels().length-1)st.bandIdx++; st.rom=0; st.targetReps=st.rr[0]; }
      }
      st.streak=0;
    } else {
      st.targetReps = Math.min(st.targetReps + (feel==="Easy"?2:1), st.rr[1]);
    }
  }
  const after=JSON.stringify([st.load,st.bandIdx,st.targetReps,st.sets,st.rom,st.intensity]);
  st.stale = (after===before) ? (st.stale||0)+1 : 0;   // plateau sentinel
}
// Welcome Back: after a real gap, auto-regress loads so re-entry is easy & safe. Returns % eased (0 if none).
function applyLayoff(){
  const last=S.progress.lastWorkoutMs; if(!last) return 0;
  const days=(Date.now()-last)/864e5;
  if(days<10) return 0;
  const pct=Math.min(0.30, 0.10 + 0.10*Math.floor(days/14));   // ~10% base, +10% per 2 wks, cap 30%
  for(const id in S.exState){ const st=S.exState[id], def=EX[id]; if(!def) continue; st.streak=0;
    if(def.eq==="db"&&st.load){ const inc=dbInc(); st.load=Math.max(inc, Math.round(st.load*(1-pct)/inc)*inc); }
    else if(def.eq==="band"){ if(st.rom>0)st.rom=0; else if(st.bandIdx>0)st.bandIdx=Math.max(0,st.bandIdx-1); }
    if(st.rr) st.targetReps=st.rr[0];
  }
  S.blockWeek=1;
  return Math.round(pct*100);
}
// Stats helpers (Proof / Your Story)
function sessVol(s){return s.entries.reduce((v,e)=>v+e.sets.filter(x=>x.done&&EX[e.ex]&&EX[e.ex].eq==="db").reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);}
function firstWeight(id){for(const s of S.sessions){const e=s.entries.find(x=>x.ex===id);if(e){const ds=e.sets.filter(x=>x.done&&x.weight);if(ds.length)return Math.max(...ds.map(x=>x.weight));}}return null;}
function strengthDeltas(){const out=[];for(const id in S.exState){if(!EX[id]||EX[id].eq!=="db")continue;const to=(S.prs[id]&&S.prs[id].bestWeight)||S.exState[id].load;const from=firstWeight(id);if(from&&to>from)out.push({name:EX[id].name,from,to,delta:to-from});}return out.sort((a,b)=>b.delta-a.delta);}
function monthVol(off){const n=new Date();const d=new Date(n.getFullYear(),n.getMonth()-off,1);return S.sessions.filter(s=>{const sd=new Date(s.endedAt||s.startedAt);return sd.getMonth()===d.getMonth()&&sd.getFullYear()===d.getFullYear();}).reduce((v,s)=>v+sessVol(s),0);}

/* -------------------------------------- GAME (gamification) -------------------------------------- */
function levelFromXp(total){let lvl=1,spent=0;const cost=n=>Math.round(100*Math.pow(n,1.5));while(spent+cost(lvl)<=total){spent+=cost(lvl);lvl++;}return{level:lvl,into:total-spent,need:cost(lvl)};}
function beltFor(level){let b="Novice";for(const[m,n]of BELTS)if(level>=m)b=n;return b;}
function rollWeek(now=Date.now()){
  const p=S.progress, key=weekKey(now);
  if(p.week.key===key) return [];
  const ev=[];
  // close previous week if it existed and wasn't satisfied
  if(p.week.key && !p.week.perfect && p.week.days.length>0){
    const nearMiss=p.week.segments>=p.weeklyGoal-1;
    if(nearMiss && p.freezeTokens>0){
      p.freezeTokens--; bumpStreak(key,now); ev.push({t:"freeze"});
    } else if(p.streak.current>0 && !p.streak.repairDeadline){
      p.streak.repairDeadline=now+7*864e5; p.streak.headStart=1; ev.push({t:"paused"});
    }
  }
  // repair window lapsed?
  if(p.streak.repairDeadline && now>p.streak.repairDeadline){ p.streak.current=0; p.streak.repairDeadline=null; }
  // open new week
  p.week={key, days:[], segments:Math.min(p.streak.headStart,p.weeklyGoal), perfect:false};
  // advance block wave if the prior block week had training
  return ev;
}
function bumpStreak(satisfiedKey,now){
  const st=S.progress.streak;
  if(st.lastSatisfiedWeek===satisfiedKey) return;
  st.current+=1; st.best=Math.max(st.best,st.current); st.lastSatisfiedWeek=satisfiedKey; st.repairDeadline=null;
}
function sessionVolume(sess){return sess.entries.reduce((v,e)=>v+e.sets.filter(s=>s.done&&EX[e.ex].eq==="db").reduce((a,s)=>a+(s.weight||0)*(s.reps||0),0),0);}
function onWorkoutCompleted(sess,now=Date.now()){
  const p=S.progress, events=[];
  rollWeek(now).forEach(e=>events.push(e));
  // XP
  let xp=0, overload=[];
  for(const e of sess.entries){
    const def=EX[e.ex];
    for(const s of e.sets){ if(!s.done) continue; xp+=10; }
    // overload bonus (db): beat prior best weight
    if(def.eq==="db"){ const pr=S.prs[e.ex]; const top=Math.max(0,...e.sets.filter(s=>s.done).map(s=>s.weight||0)); if(pr&&top>pr.bestWeight){xp+=15;overload.push(def.name);} }
  }
  xp+=50; // completion
  // PRs
  const newPRs=[];
  for(const e of sess.entries){ const def=EX[e.ex]; if(def.eq!=="db")continue;
    for(const s of e.sets){ if(!s.done)continue; const e1=est1RM(s.weight,s.reps); const pr=S.prs[e.ex]||{best1RM:0,bestWeight:0};
      if(e1>pr.best1RM||s.weight>pr.bestWeight){ S.prs[e.ex]={best1RM:Math.max(e1,pr.best1RM),bestWeight:Math.max(s.weight,pr.bestWeight),at:now}; if(!newPRs.includes(def.name))newPRs.push(def.name);} } }
  if(newPRs.length){ p.lifetime.prs+=newPRs.length; events.push({t:"pr",names:newPRs}); }
  // segment fill
  const day=localDate(sess.endedAt||now);
  const first=!p.week.days.includes(day); if(first)p.week.days.push(day);
  p.week.segments=Math.min(p.week.days.length+p.streak.headStart,p.weeklyGoal);
  // perfect week

function finishWorkout(){
  const ses=S.activeSession; ses.endedAt=Date.now(); ses.status="completed";
  // progression for next time
  ses.entries.forEach(progressExercise);
  // gamification
  const res=onWorkoutCompleted(ses);
  ses.xp=res.xp; ses.newPRs=res.newPRs; ses.events=res.events;
  S.sessions.push(stripForHistory(ses));
  S.rotationIndex=(S.rotationIndex+1)%activeRoutines().length;
  if(S.blockWeek>=5)S.blockWeek=1; // deload completed → new block
  else if(S.progress.lifetime.workouts%3===0)S.blockWeek++; // advance the RIR wave ~weekly
  // V3 Seasons: close & rotate the season after SEASON_LEN workouts (auto mode only)
  if((S.settings.seasonFocus||"auto")==="auto" && S.progress.lifetime.workouts-(S.season.startWorkouts||0)>=SEASON_LEN){
    const from=activeSeason().name; S.season.index=(S.season.index||0)+1; S.season.startWorkouts=S.progress.lifetime.workouts;
    res.events.push({t:"season",from,to:activeSeason().name});
  }
  S.activeSession=null; endRest();
  todayOpts={time:"full",place:"home",energy:"good"}; homeExpand=false;   // reset Right-Sized for next time
  save();
  S._lastRecap={xp:res.xp,events:res.events,sess:ses};

}

     ${APP.order.map(id=>{const pr=APP.profiles[id].profile;return `<div class="row between"><span>${pr.name||"Unnamed"}${id===APP.active?' · current':''}</span>${id===APP.active?'<span class="dim">active</span>':`<button class="btn btn-ghost psw" data-pid="${id}" style="min-height:38px;padding:0 14px">Switch</button>`}</div>`;}).join("")}
     <button class="btn btn-block" id="add-person2">${icon('plus')} Add a person</button>
     ${APP.order.length>1?`<button class="btn btn-ghost btn-block" id="del-person" style="color:var(--hard)">Remove ${S.profile.name||'this person'}</button>`:''}
   </div>
   <div class="card stack">
     <div class="eyebrow">Your data (stays on this phone)</div>
     <button class="btn btn-block" id="s-export">${icon('download')} Back up my data (.json)</button>
     <button class="btn btn-ghost btn-block" id="s-import">${icon('upload')} Restore from a backup</button>
     <button class="btn btn-ghost btn-block" id="s-journal">${icon('download')} Download journal (.html)</button>
     <input type="file" id="s-file" accept="application/json" style="display:none">
     <p class="dim" style="font-size:12px">Back up after big milestones — reinstalling or clearing Safari can erase on-device data.</p>
     <div id="s-storage" class="dim" style="font-size:12px"></div>
   </div>
   <div class="card"><div class="eyebrow">Achievements (${a.length}/${ACH.length})</div>
     <div class="metarow" style="margin-top:10px">${ACH.map(([id,label])=>`<span class="pill" style="${S.progress.achievements[id]?'':'opacity:.4'}">${icon(S.progress.achievements[id]?'medal':'lock')} ${label}</span>`).join("")}</div></div>
   <div class="card"><div class="eyebrow">Danger zone</div><button class="btn btn-ghost btn-block" id="s-reset" style="margin-top:10px;color:var(--hard)">Reset everything</button></div>
   <p class="center dim" style="font-size:12px;margin-top:16px">FORGE v${VERSION}</p>`;
  $("#back").onclick=()=>view("home");
  $("#s-name").onchange=e=>{S.profile.name=e.target.value;save();};
  $("#s-why").onchange=e=>{S.profile.why=e.target.value;save();};
  $$(".sset").forEach(b=>b.onclick=()=>{S.profile.dumbbellMax=+b.dataset.w; for(const id in S.exState){if(EX[id]&&EX[id].eq==="db"&&S.exState[id].load)S.exState[id].load=snapWeight(S.exState[id].load);} save();renderSettings();});
  $$(".iset").forEach(b=>b.onclick=()=>{S.profile.dumbbellIncrement=+b.dataset.i; for(const id in S.exState){if(EX[id]&&EX[id].eq==="db"&&S.exState[id].load)S.exState[id].load=snapWeight(S.exState[id].load);} save();renderSettings();});
  $$(".bset").forEach(b=>b.onclick=()=>{S.profile.bandCount=+b.dataset.n;save();renderSettings();});
  $("#s-sound").onchange=e=>{S.settings.sound=e.target.checked;save();};
  $$(".dset").forEach(b=>b.onclick=()=>{const n=+b.dataset.days; S.progress.weeklyGoal=n; S.profile.weeklyGoal=n; save();renderSettings();});
  { const ec=$("#s-ecc"); if(ec)ec.onchange=e=>{S.settings.eccentric=e.target.checked;save();}; }
  { const it=$("#s-itb"); if(it)it.onchange=e=>{S.settings.itbWarmup=e.target.checked;save();}; }
  $$(".fset").forEach(b=>b.onclick=()=>{S.settings.seasonFocus=b.dataset.focus; save();renderSettings();});
  $$(".tset").forEach(b=>b.onclick=()=>{S.profile.theme=b.dataset.theme; applyTheme(S.profile.theme); save(); renderSettings();});
  $$(".psw").forEach(b=>b.onclick=()=>switchProfile(b.dataset.pid));
  const ap2=$("#add-person2"); if(ap2)ap2.onclick=addProfile;
  const dpb=$("#del-person"); if(dpb)dpb.onclick=()=>{ if(confirm(`Remove ${S.profile.name||'this person'} and all their data? This cannot be undone.`)) removeProfile(APP.active); };
  $("#s-export").onclick=exportData;
  $("#s-import").onclick=()=>$("#s-file").click();
  $("#s-journal").onclick=exportJournal;
  $("#s-file").onchange=importData;
  (async()=>{ const parts=[]; if(navigator.storage&&navigator.storage.estimate){try{const est=await navigator.storage.estimate(); const persisted=navigator.storage.persisted?await navigator.storage.persisted():false; parts.push(`${((est.usage||0)/1048576).toFixed(1)} MB used`); parts.push(persisted?"protected":"best-effort");}catch(e){}} const lb=S.settings.lastBackupWorkouts||0, since=S.progress.lifetime.workouts-lb; parts.push(S.settings.lastBackupAt?`last backup ${since} workout${since===1?"":"s"} ago`:"never backed up"); const el2=$("#s-storage"); if(el2)el2.textContent=parts.join(" · "); })();
  $("#s-reset").onclick=()=>{if(confirm("Erase all workouts, streak, and progress for "+(S.profile.name||"this person")+"? This cannot be undone.")){const t=S.profile.theme; APP.profiles[APP.active]=freshState(); S=APP.profiles[APP.active]; S.profile.theme=t; applyTheme(t); resetTransient(); save(); view("home");}};
}
function markBackup(){ S.settings.lastBackupWorkouts=S.progress.lifetime.workouts; S.settings.lastBackupAt=Date.now(); save(); }
async function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const file=new File([blob],`forge-backup-${localDate()}.json`,{type:"application/json"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ try{await navigator.share({files:[file]}); markBackup(); return;}catch(e){if(e.name==="AbortError")return;} }
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=file.name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
  markBackup(); toast("Backup downloaded");
}
function exportJournal(){
  const items=[...S.sessions].reverse();
  const rows=items.map(s=>{const d=new Date(s.endedAt||s.startedAt); const vol=s.entries.reduce((v,e)=>v+e.sets.filter(x=>x.done&&EX[e.ex]&&EX[e.ex].eq==="db").reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);
    const lines=s.entries.map(e=>{const def=EX[e.ex]||{name:e.ex,eq:"db"}; const ds=e.sets.filter(x=>x.done); if(!ds.length)return ""; const setStr=ds.map(x=>def.eq==="band"?`${(bandLevels()[x.bandIdx]||{}).label||"band"} x${x.reps}`:`${x.weight} lb x ${x.reps}`).join(", "); return `<tr><td>${def.name}</td><td>${setStr}</td></tr>`;}).join("");
    return `<h3>${d.toLocaleDateString(undefined,{weekday:"short",year:"numeric",month:"short",day:"numeric"})} &mdash; ${s.label} <span style="color:#888;font-weight:400">(${vol.toLocaleString()} lb${s.newPRs&&s.newPRs.length?`, ${s.newPRs.length} PR`:""})</span></h3><table>${lines}</table>`;
  }).join("");
  const html=`<!doctype html><meta charset="utf-8"><title>FORGE Training Journal</title><style>body{font:16px/1.5 -apple-system,system-ui,sans-serif;max-width:44rem;margin:2rem auto;padding:0 1rem;color:#111}h1{font-size:1.6rem}h3{margin:1.4rem 0 .3rem;font-size:1.05rem}table{width:100%;border-collapse:collapse;margin-bottom:.5rem}td{padding:.3rem .2rem;border-bottom:1px solid #eee}td:last-child{text-align:right;color:#333}</style><h1>FORGE Training Journal</h1><p>${S.profile.name?S.profile.name+" &middot; ":""}${S.progress.lifetime.workouts} workouts &middot; ${Math.round(S.progress.lifetime.volumeLb/1000)}k lb &middot; Level ${S.progress.level} ${S.progress.belt}</p>${rows||"<p>No sessions yet.</p>"}`;
  const blob=new Blob([html],{type:"text/html"});
  const file=new File([blob],`forge-journal-${localDate()}.html`,{type:"text/html"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file]}).catch(()=>{}); return; }
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=file.name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Journal downloaded");
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);if(!data.schemaVersion)throw 0;const st=normalize(data);APP.profiles[APP.active]=st;S=st;applyTheme(S.profile.theme);save();toast("Backup restored");view("home");}catch(e){alert("That doesn't look like a FORGE backup.");}};
  r.readAsText(f);
}

/* ---- Add to Home Screen hint ---- */
function maybeA2HS(){
  const standalone = window.navigator.standalone || matchMedia("(display-mode: standalone)").matches;
  if(standalone || localStorage.getItem("forge.a2hs.dismissed")) return;
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(!isiOS) return;
  if($(".a2hs"))return;
  const b=el(`<div class="a2hs"><div style="flex:none;color:var(--ember)">${icon('share',{size:24})}</div><div class="grow" style="font-size:14px">Add FORGE to your Home Screen — it opens instantly, works offline, and keeps your data safe.<br><span class="dim">Tap the Share button, then "Add to Home Screen".</span></div><button class="iconbtn" id="a2-x" aria-label="Dismiss"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div>`);
  document.body.appendChild(b);
  $("#a2-x").onclick=()=>{localStorage.setItem("forge.a2hs.dismissed","1");b.remove();};
}

/* -------------------------------------- BOOT -------------------------------------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const hadController=!!navigator.serviceWorker.controller;
    navigator.serviceWorker.register("sw.js").then(reg=>{
      document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible")reg.update(); });
    }).catch(()=>{});
    let refreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(refreshing||!hadController)return; refreshing=true; location.reload(); }); // apply updates on next launch, skip first install
  });
}
if(navigator.storage&&navigator.storage.persist&&S.profile.onboarded)navigator.storage.persist();
applyTheme(S.profile.theme);
S._view="home";
render();
</script>
</body>
